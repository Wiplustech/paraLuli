<html lang="pt-BR">

    <style>
        /* Animação personalizada para o coração batendo */
        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .animate-heart {
            animation: pulse-heart 1.5s ease-in-out infinite;
        }

        /* Fundo com textura/padrão sutil para não ficar muito "clean" */
        .bg-pattern {
            background-color: #0f172a; /* Slate 900 - Azul Escuro */
            background-image: radial-gradient(circle at 20% 30%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(29, 78, 216, 0.4) 0%, transparent 50%);
            background-size: cover;
            background-position: center;
        }

        /* Barra de rolagem personalizada para a letra da música */
        .custom-scrollbar::-webkit-scrollbar {
            width: 0px; /* Escondi a barra para ficar ainda mais limpo e focar no autoscroll */
            background: transparent;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Nova Animação suave de entrada em cascata */
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

        function initInteractiveElements() {
            // --- Elementos do DOM ---
            const btnPlay = document.getElementById('btn-play');
            const iconPlay = document.getElementById('icon-play');
            const iconPause = document.getElementById('icon-pause');
            const audio = document.getElementById('audio-player');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const timeCurrent = document.getElementById('time-current');
            const timeTotal = document.getElementById('time-total');
            const btnLoop = document.getElementById('btn-loop');
            
            const btnLyrics = document.getElementById('btn-lyrics');
            const lyricsModal = document.getElementById('lyrics-modal');
            const btnCloseLyrics = document.getElementById('btn-close-lyrics');
            const lyricsContent = document.getElementById('lyrics-content');
            const lyricsScrollContainer = document.getElementById('lyrics-scroll-container');
            const lyricsLines = document.querySelectorAll('.lyric-line');
            
            const btnLetter = document.getElementById('btn-letter');
            const letterContent = document.getElementById('letter-content');
            const textBtnLetter = document.getElementById('text-btn-letter');

            // --- Variáveis de Estado ---
            let isPlaying = false;
            let isLooping = false;
            let currentActiveLyricIndex = -1;
            let letterOpen = false;

            // --- Lógica da Carta Virtual ---
            btnLetter.addEventListener('click', () => {
                letterOpen = !letterOpen;
                if (letterOpen) {
                    letterContent.classList.remove('hidden');
                    textBtnLetter.textContent = "Fechar Carta";
                    
                    // Força a renderização do elemento antes de aplicar animação
                    void letterContent.offsetWidth;
                    
                    letterContent.classList.remove('scale-95', 'opacity-0');
                    letterContent.classList.add('scale-100', 'opacity-100');
                    
                    // Rola a tela suavemente para a carta recém-aberta
                    setTimeout(() => {
                        letterContent.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 300);
                } else {
                    textBtnLetter.textContent = "Abrir Carta Especial";
                    letterContent.classList.remove('scale-100', 'opacity-100');
                    letterContent.classList.add('scale-95', 'opacity-0');
                    setTimeout(() => {
                        letterContent.classList.add('hidden');
                    }, 500);
                }
            });

            // --- Lógica da Letra da Música ---
            const openLyrics = () => {
                lyricsModal.classList.remove('opacity-0', 'pointer-events-none');
                lyricsModal.classList.add('opacity-100', 'pointer-events-auto');
                lyricsContent.classList.remove('translate-y-10');
                lyricsContent.classList.add('translate-y-0');
            };

            const closeLyrics = () => {
                lyricsModal.classList.remove('opacity-100', 'pointer-events-auto');
                lyricsModal.classList.add('opacity-0', 'pointer-events-none');
                lyricsContent.classList.remove('translate-y-0');
                lyricsContent.classList.add('translate-y-10');
            };

            btnLyrics.addEventListener('click', openLyrics);
            btnCloseLyrics.addEventListener('click', closeLyrics);
            
            lyricsModal.addEventListener('click', (e) => {
                if (e.target === lyricsModal) {
                    closeLyrics();
                }
            });

            lyricsLines.forEach(line => {
                line.addEventListener('click', () => {
                    const time = parseFloat(line.getAttribute('data-time'));
                    audio.currentTime = time;
                    if (!isPlaying) {
                        audio.play().catch(e => console.log("Erro ao tocar."));
                        isPlaying = true;
                        iconPlay.classList.add('hidden');
                        iconPause.classList.remove('hidden');
                    }
                });
            });

            // --- Lógica do Player ---
            btnLoop.addEventListener('click', () => {
                isLooping = !isLooping;
                audio.loop = isLooping; 
                if (isLooping) {
                    btnLoop.classList.remove('text-blue-300/50');
                    btnLoop.classList.add('text-white', 'drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]');
                } else {
                    btnLoop.classList.add('text-blue-300/50');
                    btnLoop.classList.remove('text-white', 'drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]');
                }
            });

            btnPlay.addEventListener('click', () => {
                if (isPlaying) {
                    audio.pause();
                    iconPlay.classList.remove('hidden');
                    iconPause.classList.add('hidden');
                } else {
                    audio.play().catch(e => console.log("Erro ao tocar áudio. Certifique-se de que o arquivo mp3 está na mesma pasta."));
                    iconPlay.classList.add('hidden');
                    iconPause.classList.remove('hidden');
                }
                isPlaying = !isPlaying;
            });

            progressContainer.addEventListener('click', (e) => {
                const rect = progressContainer.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                if (!isNaN(audio.duration)) {
                    const newTime = (clickX / width) * audio.duration;
                    audio.currentTime = newTime;
                }
            });

            function formatTime(seconds) {
                if (isNaN(seconds)) return "0:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            audio.addEventListener('loadedmetadata', () => {
                timeTotal.textContent = formatTime(audio.duration);
            });

            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;

                const percent = (currentTime / audio.duration) * 100;
                progressBar.style.width = `${percent}%`;
                timeCurrent.textContent = formatTime(currentTime);

                let newActiveIndex = -1;
                for (let i = 0; i < lyricsLines.length; i++) {
                    const time = parseFloat(lyricsLines[i].getAttribute('data-time'));
                    if (currentTime >= time) {
                        newActiveIndex = i;
                    } else {
                        break;
                    }
                }

                if (newActiveIndex !== currentActiveLyricIndex && newActiveIndex !== -1) {
                    if (currentActiveLyricIndex !== -1) {
                        lyricsLines[currentActiveLyricIndex].classList.remove('opacity-100', 'scale-[1.03]');
                        lyricsLines[currentActiveLyricIndex].classList.add('opacity-40');
                    }
                    
                    lyricsLines[newActiveIndex].classList.remove('opacity-40');
                    lyricsLines[newActiveIndex].classList.add('opacity-100', 'scale-[1.03]');

                    const activeLine = lyricsLines[newActiveIndex];
                    const containerHeight = lyricsScrollContainer.clientHeight;
                    const lineTop = activeLine.offsetTop;
                    const lineHeight = activeLine.clientHeight;

                    lyricsScrollContainer.scrollTo({
                        top: lineTop - (containerHeight / 2) + (lineHeight / 2),
                        behavior: 'smooth'
                    });

                    currentActiveLyricIndex = newActiveIndex;
                } else if (newActiveIndex === -1 && currentActiveLyricIndex !== -1) {
                    lyricsLines[currentActiveLyricIndex].classList.remove('opacity-100', 'scale-[1.03]');
                    lyricsLines[currentActiveLyricIndex].classList.add('opacity-40');
                    currentActiveLyricIndex = -1;
                    lyricsScrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            audio.addEventListener('ended', () => {
                if (!isLooping) {
                    isPlaying = false;
                    iconPlay.classList.remove('hidden');
                    iconPause.classList.add('hidden');
                    progressBar.style.width = '0%';
                    audio.currentTime = 0;
                }
            });
        }
    </script>
